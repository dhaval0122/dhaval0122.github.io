name: Monthly CFPB Dashboard Refresh
on:
  push:
    branches: [main]
    paths:
      - 'Data/cfpb_data.xlsx'
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
      - name: Set up Python 3.12
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run data refresh script
        run: python scripts/refresh_data.py
      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cfpb_dashboard.html
          git diff --staged --quiet || git commit -m "chore: refresh CFPB data — $(date +'%B %Y')"
          git push

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
